name: Daily Data Update

on:
  schedule:
    - cron: '0 14 * * *'   # 22:00 CST，每天增量更新
    - cron: '0 14 * * 0'   # 22:00 CST，每周日全量刷新用户画像
  push:
    branches: [main]
    paths:
      - 'config/repos.yml'
      - 'config/discussions.yml'
      - 'config/community.yml'
  repository_dispatch:
    types: [internal-developers-updated]
  workflow_dispatch:
    inputs:
      full_refresh:
        description: '是否全量刷新用户画像（清空 user_profiles.json）'
        type: boolean
        default: false
      run_stale_notify:
        description: '是否执行超期 MR 通知'
        type: boolean
        default: false
      stale_days:
        description: '超期天数（默认 14）'
        type: number
        default: 14
      test_email:
        description: '测试邮箱（填写后仅发送到该邮箱，不发给实际作者）'
        type: string
        default: ''
      admin_report_to:
        description: '管理员汇总报告发送邮箱（覆盖私仓配置）'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout private developer list
        uses: actions/checkout@v4
        with:
          repository: KennChow/cann-radar-private
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: .private

      - name: Inject private config files
        run: |
          mkdir -p config
          cp .private/internal_developers.txt config/internal_developers.txt
          cp .private/gitcode_2_mail.txt config/gitcode_2_mail.txt
          cp .private/smtp_config.ini config/smtp_config.ini
          cp .private/admin_email.txt config/admin_email.txt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 每天清除采集缓存，保留 user_profiles.json（增量追加）
      # 手动触发或周日全量刷新时清除用户画像
      - name: Clear stale caches
        run: |
          rm -f data/repos.json
          rm -f data/org_timeline.json
          rm -f data/weekly_activity.json
          rm -f data/dlevel_summary.json
          rm -f data/users_slim.json
          rm -f data/issue_summary.json
          rm -f data/mr_summary.json
          rm -rf data/stars/
          rm -rf data/forks/
          rm -rf data/mrs/
          rm -rf data/issues/
          rm -rf data/repo_discussions/
          # 社区公共数据缓存
          rm -f data/community/repos.json
          rm -rf data/community/stars/
          rm -rf data/community/issues/
          rm -rf data/community/mrs/
          rm -rf data/community/repo_discussions/
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ] || \
             [ "${{ github.event.schedule }}" = "0 14 * * 0" ]; then
            echo "全量刷新：清除 user_profiles.json"
            rm -f data/user_profiles.json
          fi

      - name: Install Python dependencies
        run: python -m pip install PyYAML

      - name: Collect all data
        run: python collector.py all

      - name: Collect community data
        run: python collector.py community-all

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: 自动更新数据 $(date -u '+%Y-%m-%d')"
            git push
          )

      - name: Notify stale MR authors
        if: github.event.inputs.run_stale_notify == 'true'
        run: |
          ARGS="--stale-days ${{ github.event.inputs.stale_days || 14 }}"
          if [ -n "${{ github.event.inputs.test_email }}" ]; then
            ARGS="$ARGS --test ${{ github.event.inputs.test_email }}"
          fi
          if [ -n "${{ github.event.inputs.admin_report_to }}" ]; then
            ARGS="$ARGS --report-to ${{ github.event.inputs.admin_report_to }}"
          fi
          python stale_mr_notify.py $ARGS

      - name: Commit notified MR tracking
        if: github.event.inputs.run_stale_notify == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stale_mr_notified.json
          git diff --staged --quiet && echo "No tracking changes" || (
            git commit -m "chore: 更新超期 MR 通知记录 $(date -u '+%Y-%m-%d')"
            git push
          )
